services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/media:/app/media
      - dbdata:/app/data        # dossier au lieu d'un fichier

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=
      - INTERNAL_API_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  dbdata: